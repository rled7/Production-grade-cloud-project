name: build-test-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ml-ecs-benchmark
  ECS_CLUSTER: ml-ecs-benchmark
  LANGUAGES: "js python c cpp"

jobs:
  # ----------------------------------------------------------------------
  # Test gate — must pass before we build or push anything.
  # ----------------------------------------------------------------------

  test-js:
    name: test (js)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/js } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/js/package-lock.json
      - run: npm ci
      - run: npm test

  test-python:
    name: test (python)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/python } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/python/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  test-c:
    name: test (c)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/c } }
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev libhiredis-dev
      - run: make test

  test-cpp:
    name: test (cpp)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/cpp } }
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
              libpqxx-dev libhiredis-dev libgtest-dev
      - run: cmake -S . -B build
      - run: cmake --build build --target unit_tests -j
      - run: ./build/unit_tests

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.8 }
      - name: fmt check
        run: terraform fmt -check -recursive terraform/
      - name: validate modules
        run: |
          for d in terraform/modules/*/; do
            echo "--- $d ---"
            terraform -chdir="$d" init -backend=false
            terraform -chdir="$d" validate
          done
      - name: validate prod env
        run: |
          terraform -chdir=terraform/environments/prod init -backend=false
          terraform -chdir=terraform/environments/prod validate

  # Real `terraform plan` against the prod env. Catches provider-side issues
  # that `validate` does not (IAM trust mismatches, ACM region rules, etc.).
  # Skipped unless the AWS_DEPLOY_ROLE_ARN secret is configured.
  terraform-plan:
    name: terraform plan (prod)
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    if: github.event_name == 'pull_request' && vars.RUN_TERRAFORM_PLAN == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.8 }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: terraform init
        run: terraform -chdir=terraform/environments/prod init
      - name: terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_api_key:     ${{ secrets.TF_API_KEY }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_domain_name: ${{ vars.TF_DOMAIN_NAME }}
          TF_VAR_route53_zone_id: ${{ vars.TF_ROUTE53_ZONE_ID }}
        run: terraform -chdir=terraform/environments/prod plan -no-color -lock=false

  # ----------------------------------------------------------------------
  # Lint gate — eslint, ruff, clang-format. Runs in parallel with tests;
  # security-fs-scan depends on both so a lint failure also blocks deploy.
  # ----------------------------------------------------------------------

  lint:
    name: lint (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: js
          - lang: python
          - lang: c
          - lang: cpp
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node (js)
        if: matrix.lang == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/js/package-lock.json
      - name: ESLint (js)
        if: matrix.lang == 'js'
        run: |
          cd apps/js
          npm ci
          npx eslint src/ tests/
      - name: Set up Python (python)
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff (python)
        if: matrix.lang == 'python'
        run: |
          cd apps/python
          pip install ruff==0.6.9
          ruff check .
      - name: Install clang-format (c / cpp)
        if: matrix.lang == 'c' || matrix.lang == 'cpp'
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: clang-format check (c)
        if: matrix.lang == 'c'
        run: |
          clang-format --dry-run -Werror \
            apps/c/src/*.c apps/c/src/*.h apps/c/tests/test_handlers.c
      - name: clang-format check (cpp)
        if: matrix.lang == 'cpp'
        run: |
          clang-format --dry-run -Werror \
            apps/cpp/src/*.cpp apps/cpp/src/*.hpp apps/cpp/tests/test_handlers.cpp

  # ----------------------------------------------------------------------
  # Security gate — Trivy scans source code and IaC. Fails the workflow on
  # CRITICAL or HIGH findings, so it must pass before image build.
  # ----------------------------------------------------------------------

  security-fs-scan:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [test-js, test-python, test-c, test-cpp, terraform-validate, lint]
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem (dependencies)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Trivy IaC (Terraform)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  # ----------------------------------------------------------------------
  # Build + push per-language container images. Trivy scans the image
  # before any push step.
  # ----------------------------------------------------------------------

  build-and-push:
    name: build & push (${{ matrix.lang }})
    runs-on: ubuntu-latest
    needs: [security-fs-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        lang: [js, python, c, cpp]
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image
        run: |
          REPO="${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.lang }}"
          # SHA-only tag. ECR repos are IMMUTABLE so :latest is intentionally
          # not pushed; the deploy job patches the ECS task def to the SHA.
          docker build -t "$REPO:${{ github.sha }}" ./apps/${{ matrix.lang }}
          echo "REPO=$REPO" >> $GITHUB_ENV
      - name: Trivy scan built image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REPO }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Push to ECR
        run: docker push "$REPO:${{ github.sha }}"

  # ----------------------------------------------------------------------
  # DB migrations — build/push apps/migrator and invoke it as a one-shot
  # Fargate task inside the VPC's private subnets. Gates the deploy job:
  # if migrations fail, services do not roll.
  # ----------------------------------------------------------------------

  migrate:
    name: db migrate (prod)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push migrator image (SHA-only)
        run: |
          REPO="${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-migrator"
          docker build -t "$REPO:${{ github.sha }}" -f apps/migrator/Dockerfile .
          docker push "$REPO:${{ github.sha }}"
          echo "REPO=$REPO" >> $GITHUB_ENV
      - name: Register new migrator task-def revision with SHA image
        id: migrator_td
        run: |
          aws ecs describe-task-definition \
            --task-definition "${PROJECT_NAME}-migrator" \
            --query 'taskDefinition' --output json > td.json
          # Strip read-only fields, patch image to the SHA we just pushed.
          jq --arg img "${REPO}:${{ github.sha }}" '
            (.containerDefinitions[0].image) = $img
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' td.json > td-new.json
          NEW=$(aws ecs register-task-definition --cli-input-json file://td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW" >> "$GITHUB_OUTPUT"
      - name: Read network config from SSM
        id: ssm
        run: |
          SUBNETS=$(aws ssm get-parameter --name "/${PROJECT_NAME}/migrator/subnets" \
            --query 'Parameter.Value' --output text)
          SG=$(aws ssm get-parameter --name "/${PROJECT_NAME}/migrator/security-group" \
            --query 'Parameter.Value' --output text)
          QUOTED_SUBNETS=$(echo "$SUBNETS" | sed 's/^/"/;s/,/","/g;s/$/"/')
          echo "subnets=$QUOTED_SUBNETS" >> "$GITHUB_OUTPUT"
          echo "sg=$SG" >> "$GITHUB_OUTPUT"
      - name: Run migrator task (new revision)
        run: |
          NET='awsvpcConfiguration={subnets=[${{ steps.ssm.outputs.subnets }}],securityGroups=["${{ steps.ssm.outputs.sg }}"],assignPublicIp=DISABLED}'
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --network-configuration "$NET" \
            --task-definition "${{ steps.migrator_td.outputs.arn }}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task=$TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "migrator exit code: $EXIT  reason: $REASON"
          if [ "$EXIT" != "0" ]; then
            echo "::error::migrations failed (exit $EXIT). Aborting deploy."
            exit 1
          fi

  # ----------------------------------------------------------------------
  # Force ECS to redeploy each service with the new "latest" image.
  # Gated by migrate so a schema-changing release does not roll until the
  # migration is applied.
  # ----------------------------------------------------------------------

  deploy:
    name: roll services
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR (need the registry for the image URI)
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      # For each language: fetch the current task definition, patch the
      # container image to the SHA we just pushed, register a new revision,
      # and update the service to that revision. This is the "real" deploy —
      # update-service --force-new-deployment alone would only re-pull the
      # same tag, which doesn't exist with IMMUTABLE ECR.
      - name: Register new task-def revisions + update services
        run: |
          for lang in $LANGUAGES; do
            IMAGE="${{ steps.ecr.outputs.registry }}/${PROJECT_NAME}-${lang}:${{ github.sha }}"
            aws ecs describe-task-definition \
              --task-definition "${PROJECT_NAME}-${lang}" \
              --query 'taskDefinition' --output json > "td-${lang}.json"
            jq --arg img "$IMAGE" '
              (.containerDefinitions[0].image) = $img
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)
            ' "td-${lang}.json" > "td-${lang}-new.json"
            NEW=$(aws ecs register-task-definition \
              --cli-input-json "file://td-${lang}-new.json" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "${PROJECT_NAME}-${lang}" \
              --task-definition "$NEW" >/dev/null
            echo "rolled ${PROJECT_NAME}-${lang} -> $NEW"
          done
      - name: Wait for stability
        run: |
          for lang in $LANGUAGES; do
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "${PROJECT_NAME}-${lang}"
            echo "stable: ${PROJECT_NAME}-${lang}"
          done
