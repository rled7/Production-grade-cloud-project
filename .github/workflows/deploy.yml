name: build-test-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ml-ecs-benchmark
  ECS_CLUSTER: ml-ecs-benchmark
  LANGUAGES: "js python c cpp"

jobs:
  # ----------------------------------------------------------------------
  # Test gate — must pass before we build or push anything.
  # ----------------------------------------------------------------------

  test-js:
    name: test (js)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/js } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/js/package-lock.json
      - run: npm ci
      - run: npm test

  test-python:
    name: test (python)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/python } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/python/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  test-c:
    name: test (c)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/c } }
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev libhiredis-dev
      - run: make test

  test-cpp:
    name: test (cpp)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/cpp } }
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
              libpqxx-dev libhiredis-dev libgtest-dev
      - run: cmake -S . -B build
      - run: cmake --build build --target unit_tests -j
      - run: ./build/unit_tests

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.8 }
      - name: fmt check
        run: terraform fmt -check -recursive terraform/
      - name: validate modules
        run: |
          for d in terraform/modules/*/; do
            echo "--- $d ---"
            terraform -chdir="$d" init -backend=false
            terraform -chdir="$d" validate
          done
      - name: validate prod env
        run: |
          terraform -chdir=terraform/environments/prod init -backend=false
          terraform -chdir=terraform/environments/prod validate

  # Real `terraform plan` against the prod env. Catches provider-side issues
  # that `validate` does not (IAM trust mismatches, ACM region rules, etc.).
  # Skipped unless the AWS_DEPLOY_ROLE_ARN secret is configured.
  terraform-plan:
    name: terraform plan (prod)
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    if: github.event_name == 'pull_request' && vars.RUN_TERRAFORM_PLAN == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.8 }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: terraform init
        run: terraform -chdir=terraform/environments/prod init
      - name: terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_api_key:     ${{ secrets.TF_API_KEY }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_domain_name: ${{ vars.TF_DOMAIN_NAME }}
          TF_VAR_route53_zone_id: ${{ vars.TF_ROUTE53_ZONE_ID }}
        run: terraform -chdir=terraform/environments/prod plan -no-color -lock=false

  # ----------------------------------------------------------------------
  # Security gate — Trivy scans source code and IaC. Fails the workflow on
  # CRITICAL or HIGH findings, so it must pass before image build.
  # ----------------------------------------------------------------------

  security-fs-scan:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [test-js, test-python, test-c, test-cpp, terraform-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem (dependencies)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Trivy IaC (Terraform)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  # ----------------------------------------------------------------------
  # Build + push per-language container images. Trivy scans the image
  # before any push step.
  # ----------------------------------------------------------------------

  build-and-push:
    name: build & push (${{ matrix.lang }})
    runs-on: ubuntu-latest
    needs: [security-fs-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        lang: [js, python, c, cpp]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image
        run: |
          REPO="${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.lang }}"
          docker build -t "$REPO:${{ github.sha }}" -t "$REPO:latest" ./apps/${{ matrix.lang }}
          echo "REPO=$REPO" >> $GITHUB_ENV
      - name: Trivy scan built image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REPO }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Push to ECR
        run: |
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

  # ----------------------------------------------------------------------
  # Force ECS to redeploy each service with the new "latest" image.
  # Only runs after every image has been built, scanned, and pushed.
  # ----------------------------------------------------------------------

  deploy:
    name: roll services
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force new deployments
        run: |
          for lang in $LANGUAGES; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "${PROJECT_NAME}-${lang}" \
              --force-new-deployment >/dev/null
            echo "rolled ${PROJECT_NAME}-${lang}"
          done
      - name: Wait for stability
        run: |
          for lang in $LANGUAGES; do
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "${PROJECT_NAME}-${lang}"
            echo "stable: ${PROJECT_NAME}-${lang}"
          done
